<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">BATHYAL LENS</div>
      <div class="popup-tagline">See beneath the surface</div>
    </div>

    <div class="popup-section">
      <label class="popup-label">API KEY</label>
      <div class="popup-input-row">
        <input type="password" id="apiKeyInput" placeholder="sk-ant-..." class="popup-input">
        <button id="toggleKey" class="popup-btn-small" title="Show/hide">Show</button>
      </div>
      <div class="popup-hint">Stored locally. Only sent to api.anthropic.com.</div>
      <div id="keyStatus" class="popup-status"></div>
      <button id="saveKey" class="popup-btn">Save API Key</button>
    </div>

    <div class="popup-section">
      <label class="popup-label">YOUR DOMAIN</label>
      <input type="text" id="ownDomainInput" placeholder="example.com" class="popup-input">
    </div>

    <div class="popup-section">
      <label class="popup-label">TRACKED COMPETITORS</label>
      <div id="competitorsList" class="popup-competitors"></div>
      <div class="popup-input-row">
        <input type="text" id="addCompetitorInput" placeholder="competitor.com" class="popup-input">
        <button id="addCompetitor" class="popup-btn-small">+ Add</button>
      </div>
    </div>

    <div class="popup-section">
      <label class="popup-label">MODEL</label>
      <div class="popup-radio-group">
        <label class="popup-radio">
          <input type="radio" name="model" value="claude-haiku-4-5-20251001" checked>
          Haiku 4.5 <span class="popup-cost">~$0.006/query</span>
        </label>
        <label class="popup-radio">
          <input type="radio" name="model" value="claude-sonnet-4-5-20250514">
          Sonnet 4.5 <span class="popup-cost">~$0.018/query</span>
        </label>
      </div>
    </div>

    <div class="popup-section">
      <label class="popup-label">ACTIVATION</label>
      <div class="popup-radio-group">
        <label class="popup-radio">
          <input type="radio" name="activation" value="on-click" checked>
          On-click <span class="popup-hint-inline">analyze when I click the badge</span>
        </label>
        <label class="popup-radio">
          <input type="radio" name="activation" value="auto">
          Auto <span class="popup-hint-inline">analyze every AI answer automatically</span>
        </label>
      </div>
    </div>

    <div class="popup-divider"></div>

    <div id="usageSection" class="popup-usage">
      <span>Today: <strong id="usageCount">0</strong> analyses</span>
      <span>Est. cost: <strong id="usageCost">$0.00</strong></span>
    </div>

    <div class="popup-actions">
      <button id="clearCache" class="popup-btn-secondary">Clear Cache</button>
    </div>

    <div class="popup-footer">
      bathyal.ai &middot; v0.1.0
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
